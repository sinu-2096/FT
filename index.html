<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pali Ghat Hatchlings</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
}

#container{
display:flex;
height:100vh;
}

#sidebar{
width:340px;
background:white;
padding:15px;
border-right:1px solid #ddd;
overflow:auto;
}

#map{
flex:1;
}

select{
width:100%;
padding:8px;
margin-bottom:12px;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th{
background:#2f3e46;
color:white;
padding:8px;
}

td{
padding:7px;
border-bottom:1px solid #eee;
}

.radio-marker{
background:#ffd400;
border:2px solid black;
border-radius:6px;
padding:4px 6px;
font-weight:bold;
font-size:12px;
box-shadow:0 0 4px rgba(0,0,0,0.4);
}

</style>
</head>

<body>

<div id="container">

<div id="sidebar">

<h3>Pali Ghat Hatchlings</h3>

<select id="idSelector">
<option value="">All Hatchlings (Latest Locations)</option>
</select>

<div id="tableContainer"></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv";

let dataset=[];
let markers=[];

const map=L.map('map').setView([25.844,76.56],12);

L.tileLayer(
'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
{maxZoom:20}
).addTo(map);



function parseDate(str){

let parts=str.split(" ");

let date=parts[0].split("-");
let time=parts[1];

return new Date(date[2],date[1]-1,date[0],time.split(":")[0],time.split(":")[1]);

}



function csvToArray(str){

const rows=str.trim().split("\n");
const headers=rows.shift().split(",");

return rows.map(r=>{
const values=r.split(",");
let obj={};

headers.forEach((h,i)=>{
obj[h.trim()]=values[i];
});

return obj;
});

}



function clearMarkers(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

}



function createMarker(lat,lon,id){

const icon=L.divIcon({
className:"",
html:`<div class="radio-marker">${id}</div>`,
iconSize:[30,20]
});

const jitter=0.00015;

lat=lat+(Math.random()-0.5)*jitter;
lon=lon+(Math.random()-0.5)*jitter;

const m=L.marker([lat,lon],{icon}).addTo(map);

markers.push(m);

}



function showLatestPoints(){

clearMarkers();

document.getElementById("tableContainer").innerHTML="";

const latest={};

dataset.forEach(row=>{

const id=row["Animal ID"];
const t=parseDate(row["Timestamp"]);

if(!latest[id] || parseDate(latest[id]["Timestamp"])<t){

latest[id]=row;

}

});

Object.values(latest).forEach(p=>{

createMarker(
parseFloat(p["Latitude"]),
parseFloat(p["Longitude"]),
p["Animal ID"]
);

});

}



function computeStats(points){

let entries=points.length;

let days=[...new Set(points.map(p=>p["Timestamp"].split(" ")[0]))].length;

let dist=0;

for(let i=1;i<points.length;i++){

let lat1=parseFloat(points[i-1]["Latitude"]);
let lon1=parseFloat(points[i-1]["Longitude"]);
let lat2=parseFloat(points[i]["Latitude"]);
let lon2=parseFloat(points[i]["Longitude"]);

dist+=map.distance([lat1,lon1],[lat2,lon2]);

}

return{

entries:entries,
days:days,
dist:(dist/1000).toFixed(2)

};

}



function showAnimal(id){

clearMarkers();

let points=dataset
.filter(d=>d["Animal ID"]==id)
.sort((a,b)=>parseDate(b["Timestamp"])-parseDate(a["Timestamp"]));

points.forEach(p=>{

createMarker(
parseFloat(p["Latitude"]),
parseFloat(p["Longitude"]),
p["Animal ID"]
);

});

let group=L.featureGroup(markers);
map.fitBounds(group.getBounds(),{padding:[40,40]});

buildTable(points);

}



function buildTable(points){

const stats=computeStats(points);

let html=`<div style="margin-bottom:10px;">
<b>Entries:</b> ${stats.entries} |
<b>Days:</b> ${stats.days} |
<b>Distance:</b> ${stats.dist} km
</div>`;

html+="<table>";
html+="<tr><th>Time</th><th>Place</th><th>Activity</th><th>Signal</th></tr>";

points.forEach(p=>{

html+=`
<tr>
<td>${p["Timestamp"]}</td>
<td>${p["Place"]}</td>
<td>${p["Activity"]||"-"}</td>
<td>${p["Signal Stength"]||"-"}</td>
</tr>
`;

});

html+="</table>";

document.getElementById("tableContainer").innerHTML=html;

}



fetch(sheetURL)
.then(r=>r.text())
.then(csv=>{

dataset=csvToArray(csv);

const ids=[...new Set(dataset.map(d=>d["Animal ID"]))].sort((a,b)=>a-b);

ids.forEach(id=>{

const opt=document.createElement("option");
opt.value=id;
opt.text="ID "+id;

document.getElementById("idSelector").appendChild(opt);

});

showLatestPoints();

});



document.getElementById("idSelector")
.addEventListener("change",function(){

const id=this.value;

if(id===""){
showLatestPoints();
}else{
showAnimal(id);
}

});

</script>

</body>
</html>
