<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Chambal Gharial Telemetry Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f6fa;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #sidebar {
            width: 380px;
            background: white;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            padding: 24px 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            color: #111827;
            font-size: 1.25rem;
            margin-bottom: 20px;
        }

        select {
            padding: 10px 12px;
            font-size: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            width: 100%;
            cursor: pointer;
            outline: none;
            background-color: #fdfdfd;
        }

        select:focus {
            border-color: #facc15;
            box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.2);
        }

        #table-container {
            overflow-y: auto;
            flex: 1;
            border: 1px solid #eee;
            border-radius: 6px;
            background: #fff;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            font-size: 13px;
        }

        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background: #f8fafc;
            position: sticky;
            top: 0;
            font-weight: 600;
            color: #475569;
            z-index: 10;
            border-bottom: 2px solid #e2e8f0;
        }

        tbody tr:hover {
            background-color: #f1f5f9;
        }

        #map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Marker Styles Matching Your Screenshot */
        .marker-label {
            background: #facc15; /* Yellow */
            color: #000000;
            font-weight: 700;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 13px;
            text-align: center;
            border: 1px solid #000;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            white-space: nowrap;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .marker-label:hover {
            transform: scale(1.1);
            z-index: 1000 !important;
        }

        /* Custom Popup Styling */
        .custom-popup .leaflet-popup-content-wrapper {
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .custom-popup .leaflet-popup-content {
            margin: 14px 16px;
            line-height: 1.6;
            font-size: 13px;
        }
        .custom-popup h4 {
            margin: 0 0 8px 0;
            font-size: 15px;
            color: #111827;
            border-bottom: 1px solid #eee;
            padding-bottom: 4px;
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 45vh; border-right: none; border-bottom: 1px solid #ddd; padding: 15px;}
            #map-container { height: 55vh; }
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>Gharial Telemetry</h2>
        <select id="animalSelect">
            <option value="ALL">All Hatchlings (Latest View)</option>
        </select>

        <div id="table-container" class="hidden">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Date & Time</th>
                        <th>Place</th>
                        <th>Activity</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const sheetURL = "https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv";

        let map, markersLayer, trackLayer;
        let allData = [];
        let groupedData = {};

        document.addEventListener("DOMContentLoaded", () => {
            initMap();
            loadData();
            
            document.getElementById("animalSelect").addEventListener("change", (e) => {
                const id = e.target.value;
                if (id === "ALL") {
                    document.getElementById("table-container").classList.add("hidden");
                    showLatestLocations();
                } else {
                    document.getElementById("table-container").classList.remove("hidden");
                    showAnimalTrack(id);
                }
            });
        });

        function initMap() {
            map = L.map('map').setView([25.85, 76.57], 12);
            L.tileLayer("https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}", { maxZoom: 20 }).addTo(map);
            markersLayer = L.layerGroup().addTo(map);
            trackLayer = L.layerGroup().addTo(map);
        }

        // Robust CSV Parser (handles commas inside quotes)
        function parseCSV(text) {
            const rows = [];
            let row = [], val = '', inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let c = text[i];
                if (inQuotes) {
                    if (c === '"') {
                        if (i + 1 < text.length && text[i+1] === '"') { val += '"'; i++; } 
                        else { inQuotes = false; }
                    } else { val += c; }
                } else {
                    if (c === '"') { inQuotes = true; }
                    else if (c === ',') { row.push(val.trim()); val = ''; }
                    else if (c === '\n' || c === '\r') {
                        row.push(val.trim());
                        if (row.some(x => x !== '')) rows.push(row);
                        row = []; val = '';
                        if (c === '\r' && text[i+1] === '\n') i++; 
                    } else { val += c; }
                }
            }
            if (row.length > 0 || val !== '') {
                row.push(val.trim());
                if (row.some(x => x !== '')) rows.push(row);
            }

            const headers = rows[0];
            return rows.slice(1).map(r => {
                let obj = {};
                headers.forEach((h, i) => obj[h] = r[i]);
                obj.parsedDate = new Date(obj['Timestamp']);
                obj.lat = parseFloat(obj['Latitude']);
                obj.lon = parseFloat(obj['Longitude']);
                return obj;
            }).filter(d => !isNaN(d.lat) && !isNaN(d.lon));
        }

        function loadData() {
            fetch(sheetURL)
                .then(r => r.text())
                .then(text => {
                    allData = parseCSV(text);
                    
                    // Group and sort data
                    allData.forEach(d => {
                        const id = d['Animal ID'];
                        if (!groupedData[id]) groupedData[id] = [];
                        groupedData[id].push(d);
                    });

                    for (let id in groupedData) {
                        groupedData[id].sort((a, b) => b.parsedDate - a.parsedDate); // Latest first
                    }

                    populateDropdown();
                    showLatestLocations();
                })
                .catch(err => console.error("Error loading CSV:", err));
        }

        function populateDropdown() {
            const select = document.getElementById("animalSelect");
            const ids = Object.keys(groupedData).sort((a, b) => a.localeCompare(b, undefined, {numeric: true}));
            
            ids.forEach(id => {
                const opt = document.createElement("option");
                opt.value = id;
                opt.textContent = "Hatchling ID: " + id;
                select.appendChild(opt);
            });
        }

        function createPopupContent(id, dataPoint) {
            const dateStr = dataPoint.parsedDate.toLocaleString('en-US', {
                month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'
            });
            return `
                <div class="custom-popup">
                    <h4>Animal ID: ${id}</h4>
                    <b>Time:</b> ${dateStr}<br>
                    <b>Place:</b> ${dataPoint['Place'] || 'Unknown'}<br>
                    <b>Activity:</b> ${dataPoint['Activity'] || 'N/A'}<br>
                    <b>Signal:</b> ${dataPoint['Signal Strength'] || 'N/A'}<br>
                    <b>Remarks:</b> ${dataPoint['Remarks'] || 'None'}
                </div>
            `;
        }

        function createMarker(lat, lon, id, dataPoint) {
            const marker = L.marker([lat, lon], {
                icon: L.divIcon({
                    className: '', // Clear default styling
                    html: `<div class="marker-label">${id}</div>`,
                    iconSize: [30, 24],
                    iconAnchor: [15, 12],
                    popupAnchor: [0, -12]
                })
            });

            marker.bindPopup(createPopupContent(id, dataPoint));
            return marker;
        }

        function showLatestLocations() {
            markersLayer.clearLayers();
            trackLayer.clearLayers();

            const bounds = [];
            const coordsTracker = {}; // For handling overlap (Jitter)

            for (let id in groupedData) {
                if (groupedData[id].length === 0) continue;
                
                const latest = groupedData[id][0];
                let lat = latest.lat;
                let lon = latest.lon;
                
                // Spread markers that share the exact same coordinates so they don't hide each other
                const coordKey = `${lat.toFixed(4)}_${lon.toFixed(4)}`;
                if (coordsTracker[coordKey] !== undefined) {
                    coordsTracker[coordKey]++;
                    const count = coordsTracker[coordKey];
                    const angle = count * (Math.PI / 4);
                    const radius = 0.0004; // Spread radius
                    lat += Math.sin(angle) * radius;
                    lon += Math.cos(angle) * radius;
                } else {
                    coordsTracker[coordKey] = 0;
                }

                bounds.push([lat, lon]);
                const marker = createMarker(lat, lon, id, latest);
                markersLayer.addLayer(marker);
            }

            if (bounds.length > 0) map.fitBounds(L.latLngBounds(bounds), { padding: [50, 50] });
        }

        function showAnimalTrack(id) {
            markersLayer.clearLayers();
            trackLayer.clearLayers();

            const data = groupedData[id];
            if (!data || data.length === 0) return;

            const points = [];
            
            // Note: data is sorted latest->oldest. We reverse for drawing the path chronologically
            const chronoData = [...data].reverse();

            chronoData.forEach((d, index) => {
                points.push([d.lat, d.lon]);
                const marker = createMarker(d.lat, d.lon, id, d);
                
                // Keep markers below popups/hover
                marker.setZIndexOffset(index === chronoData.length - 1 ? 1000 : 0);
                markersLayer.addLayer(marker);
            });

            // Draw connecting line
            const poly = L.polyline(points, {color: "#facc15", weight: 3, dashArray: '5, 5', opacity: 0.8});
            trackLayer.addLayer(poly);
            map.fitBounds(poly.getBounds(), { padding: [50, 50] });

            populateTable(data);
        }

        function populateTable(data) {
            const body = document.getElementById("table-body");
            body.innerHTML = "";

            data.forEach(d => {
                const row = document.createElement("tr");
                const dateStr = d.parsedDate.toLocaleString('en-US', {
                    month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'
                });

                row.innerHTML = `
                    <td>${dateStr}</td>
                    <td>${d['Place'] || '-'}</td>
                    <td>${d['Activity'] || '-'}</td>
                `;
                body.appendChild(row);
            });
        }
    </script>
</body>
</html>
