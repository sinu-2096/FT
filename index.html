<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Chambal Gharial Telemetry Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:#f5f6fa;
}

#container{
display:flex;
height:100vh;
width:100%;
}

#sidebar{
width:360px;
background:white;
border-right:1px solid #ddd;
display:flex;
flex-direction:column;
padding:20px;
overflow:hidden;
}

h2{
margin-top:0;
font-weight:600;
}

select{
padding:10px;
font-size:15px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:15px;
}

#stats{
font-size:14px;
margin-bottom:10px;
}

#table-container{
overflow-y:auto;
flex:1;
border-top:1px solid #ddd;
margin-top:10px;
}

table{
border-collapse:collapse;
width:100%;
font-size:13px;
}

th,td{
padding:6px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#fafafa;
position:sticky;
top:0;
}

#map{
flex:1;
}

.marker-label{
background:#ff5722;
color:white;
font-weight:bold;
padding:4px 6px;
border-radius:6px;
font-size:12px;
text-align:center;
border:2px solid white;
box-shadow:0 0 4px rgba(0,0,0,0.4);
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div id="container">

<div id="sidebar">

<h2>Gharial Hatchlings</h2>

<select id="animalSelect">
<option value="">All Hatchlings</option>
</select>

<div id="stats" class="hidden"></div>

<div id="table-container" class="hidden">
<table id="dataTable">
<thead>
<tr>
<th>Timestamp</th>
<th>Place</th>
<th>Activity</th>
<th>Signal</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const sheetURL =
"https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv";

const map = L.map('map').setView([25.85,76.57],13);

L.tileLayer(
"https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}",
{maxZoom:20}
).addTo(map);

let allData=[];
let markersLayer=L.layerGroup().addTo(map);
let trackLayer=L.layerGroup().addTo(map);

function parseCSV(text){

const rows=text.split("\n").slice(1);

return rows.map(r=>{
const c=r.split(",");

return{
id:c[0],
timestamp:new Date(c[1]),
lat:parseFloat(c[2]),
lon:parseFloat(c[3]),
place:c[4],
activity:c[5],
signal:c[6],
remarks:c[7]
}

}).filter(d=>!isNaN(d.lat));

}

function loadData(){

fetch(sheetURL)
.then(r=>r.text())
.then(text=>{

allData=parseCSV(text);

populateDropdown();
showLatestLocations();

})

}

function populateDropdown(){

const select=document.getElementById("animalSelect");

const ids=[...new Set(allData.map(d=>d.id))].sort((a,b)=>a-b);

ids.forEach(id=>{
const opt=document.createElement("option");
opt.value=id;
opt.textContent="ID "+id;
select.appendChild(opt);
})

}

function createMarker(lat,lon,label){

return L.marker([lat,lon],{
icon:L.divIcon({
className:'',
html:`<div class="marker-label">${label}</div>`
})
})

}

function showLatestLocations(){

markersLayer.clearLayers();
trackLayer.clearLayers();

const latest={};

allData.forEach(d=>{
if(!latest[d.id] || latest[d.id].timestamp < d.timestamp){
latest[d.id]=d;
}
});

Object.values(latest).forEach(d=>{

const marker=createMarker(d.lat,d.lon,d.id);
markersLayer.addLayer(marker);

})

}

function showAnimalTrack(id){

markersLayer.clearLayers();
trackLayer.clearLayers();

const data=allData
.filter(d=>d.id==id)
.sort((a,b)=>b.timestamp-a.timestamp);

if(data.length===0) return;

const points=[];

data.forEach(d=>{

points.push([d.lat,d.lon]);

const marker=createMarker(d.lat,d.lon,id);
markersLayer.addLayer(marker);

});

const poly=L.polyline(points,{color:"yellow"});
trackLayer.addLayer(poly);

map.fitBounds(poly.getBounds(),{padding:[50,50]});

populateTable(data);
calculateStats(data);

}

function populateTable(data){

const body=document.querySelector("#dataTable tbody");
body.innerHTML="";

data.forEach(d=>{

const row=document.createElement("tr");

row.innerHTML=
`<td>${d.timestamp.toLocaleString()}</td>
<td>${d.place}</td>
<td>${d.activity}</td>
<td>${d.signal}</td>`;

body.appendChild(row);

});

document.getElementById("table-container").classList.remove("hidden");

}

function calculateStats(data){

const entries=data.length;

const days=[...new Set(data.map(d=>d.timestamp.toDateString()))].length;

let distance=0;

for(let i=1;i<data.length;i++){

const p1=L.latLng(data[i-1].lat,data[i-1].lon);
const p2=L.latLng(data[i].lat,data[i].lon);

distance+=p1.distanceTo(p2);

}

distance=(distance/1000).toFixed(2);

const stats=document.getElementById("stats");

stats.innerHTML=
`Entries: <b>${entries}</b><br>
Tracking Days: <b>${days}</b><br>
Distance: <b>${distance} km</b>`;

stats.classList.remove("hidden");

}

document.getElementById("animalSelect")
.addEventListener("change",e=>{

const id=e.target.value;

if(id===""){

document.getElementById("stats").classList.add("hidden");
document.getElementById("table-container").classList.add("hidden");

showLatestLocations();

}else{

showAnimalTrack(id);

}

});

loadData();

</script>

</body>
</html>
