<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chambal River Gharial Telemetry Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --sidebar-width: 300px;
            --map-height: 70vh;
            --primary-bg: #f4f6f9;
            --header-bg: #2c3e50;
            --text-color: #333;
            --border-color: #ccc;
            --accent-color: #3498db;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--header-bg);
            color: white;
            padding: 15px 20px;
            z-index: 1000;
        }

        .dashboard-container {
            display: flex;
            height: var(--map-height);
            border-bottom: 2px solid var(--border-color);
        }

        .sidebar {
            width: var(--sidebar-width);
            background: white;
            padding: 20px;
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
        }

        .map-container {
            flex-grow: 1;
            height: 100%;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        /* Filter Styling */
        .filter-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .filter-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 15px;
        }

        /* Table Styling */
        .table-container {
            padding: 20px;
            overflow-x: auto;
            background: white;
            flex-grow: 1;
        }

        .telemetry-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .telemetry-table th, .telemetry-table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .telemetry-table th {
            background-color: var(--header-bg);
            color: white;
            position: sticky;
            top: 0;
        }

        /* CLICKABLE ROW STYLES */
        .telemetry-table tbody tr {
            cursor: pointer;
            transition: background 0.2s;
        }

        .telemetry-table tbody tr:hover {
            background-color: #f0f7ff;
        }

        .telemetry-table tbody tr:active {
            background-color: #d1e7ff;
        }

        /* Marker Icons */
        .animal-marker {
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 11px;
            border: 2px solid white;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        .marker-default { background-color: #007bff; }
        .marker-selected { background-color: #e74c3c; }

        .custom-popup { font-size: 13px; line-height: 1.4; }
    </style>
</head>
<body>

    <header>
        <h1>🐊 Chambal Gharial Telemetry Dashboard</h1>
    </header>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="filter-group">
                <label for="animalFilter">Telemetry Filter</label>
                <select id="animalFilter">
                    <option value="all">[ All Animals ]</option>
                </select>
                <p style="font-size: 0.8rem; color: #666;">
                    Select an Animal ID to see its history. Click any row in the table to locate that specific entry on the map.
                </p>
            </div>
        </aside>

        <main class="map-container">
            <div id="map"></div>
        </main>
    </div>

    <div class="table-container">
        <table class="telemetry-table" id="dataTable">
            <thead>
                <tr>
                    <th>Animal ID</th>
                    <th>Timestamp</th>
                    <th>Place</th>
                    <th>Activity</th>
                    <th>Signal</th>
                    <th>Latitude</th>
                    <th>Longitude</th>
                    <th>Remarks</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv&gid=0';
        
        let map, mapLayerGroup;
        let animalsData = {}; // Full history
        let latestRecords = {}; // Only latest per ID

        function init() {
            // Map Setup
            map = L.map('map').setView([25.84, 76.56], 13);
            L.tileLayer('http://mt0.google.com/vt/lyrs=y&hl=en&x={x}&y={y}&z={z}', {
                maxZoom: 20, attribution: 'Google Satellite'
            }).addTo(map);
            mapLayerGroup = L.featureGroup().addTo(map);

            loadData();

            document.getElementById('animalFilter').addEventListener('change', (e) => {
                renderUI(e.target.value);
            });
        }

        function loadData() {
            Papa.parse(CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    processRecords(results.data);
                    populateDropdown();
                    renderUI('all');
                }
            });
        }

        function processRecords(data) {
            animalsData = {};
            latestRecords = {};

            data.forEach(row => {
                const id = row['Animal ID'];
                if (!id) return;
                
                if (!animalsData[id]) animalsData[id] = [];
                animalsData[id].push(row);
            });

            for (const id in animalsData) {
                // Sort by timestamp desc (Assumes DD-MM-YYYY format, split for simple sorting)
                animalsData[id].sort((a, b) => parseDate(b['Timestamp']) - parseDate(a['Timestamp']));
                latestRecords[id] = animalsData[id][0];
            }
        }

        function parseDate(s) {
            if(!s) return 0;
            const b = s.split(/\D/);
            return new Date(b[2], b[1]-1, b[0], b[3], b[4]);
        }

        function populateDropdown() {
            const select = document.getElementById('animalFilter');
            Object.keys(animalsData).sort().forEach(id => {
                const opt = document.createElement('option');
                opt.value = id; opt.textContent = id;
                select.appendChild(opt);
            });
        }

        function renderUI(selectedId) {
            mapLayerGroup.clearLayers();
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = '';

            let displaySet = [];
            let isSingle = selectedId !== 'all';

            if (!isSingle) {
                displaySet = Object.values(latestRecords);
            } else {
                displaySet = animalsData[selectedId];
            }

            displaySet.forEach(row => {
                const lat = parseFloat(row['Latitude']);
                const lng = parseFloat(row['Longitude']);
                if (isNaN(lat) || isNaN(lng)) return;

                // Create Marker
                const marker = createMarker(row, isSingle ? 'marker-selected' : 'marker-default');
                mapLayerGroup.addLayer(marker);

                // Create Table Row
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><b>${row['Animal ID']}</b></td>
                    <td>${row['Timestamp']}</td>
                    <td>${row['Place']}</td>
                    <td>${row['Activity']}</td>
                    <td>${row['Signal Strength'] || '-'}</td>
                    <td>${lat}</td>
                    <td>${lng}</td>
                    <td><small>${row['Remarks'] || ''}</small></td>
                `;

                // INTERACTIVE: Click row to fly to marker and open popup
                tr.onclick = () => {
                    map.flyTo([lat, lng], 16, { duration: 1.2 });
                    marker.openPopup();
                };

                tbody.appendChild(tr);
            });

            if (mapLayerGroup.getLayers().length > 0) {
                map.fitBounds(mapLayerGroup.getBounds(), { padding: [50, 50] });
            }
        }

        function createMarker(row, cssClass) {
            const icon = L.divIcon({
                className: `animal-marker ${cssClass}`,
                html: `<span>${row['Animal ID']}</span>`,
                iconSize: [26, 26]
            });

            const marker = L.marker([row['Latitude'], row['Longitude']], { icon });
            
            const popup = `
                <div class="custom-popup">
                    <b>Animal ID: ${row['Animal ID']}</b><br>
                    <hr style="margin:5px 0">
                    Time: ${row['Timestamp']}<br>
                    Activity: ${row['Activity']}<br>
                    Place: ${row['Place']}<br>
                    Signal: ${row['Signal Strength'] || 'N/A'}<br>
                    Remarks: ${row['Remarks'] || '-'}
                </div>
            `;
            marker.bindPopup(popup);
            return marker;
        }

        window.onload = init;
    </script>
</body>
</html>
