<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pali Ghat Hatchlings</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f2f4f7;
}

#container{
display:flex;
height:100vh;
}

#sidebar{
width:340px;
background:white;
padding:15px;
border-right:1px solid #ddd;
overflow:auto;
}

#map{
flex:1;
}

h3{
margin-top:0;
font-size:18px;
}

select{
width:100%;
padding:8px;
margin-bottom:12px;
font-size:14px;
border:1px solid #ccc;
border-radius:5px;
}

.stats{
background:#f7f7f7;
padding:8px;
border-radius:5px;
margin-bottom:10px;
font-size:13px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
background:white;
}

th{
background:#2f3e46;
color:white;
padding:8px;
font-size:12px;
}

td{
padding:7px;
border-bottom:1px solid #eee;
}

tr:nth-child(even){
background:#f7f7f7;
}

tr:hover{
background:#e9f5ff;
}

.radio-id{
background:#ffcc00;
border:1px solid #333;
border-radius:4px;
padding:2px 5px;
font-size:11px;
font-weight:bold;
}

@media(max-width:768px){

#container{
flex-direction:column;
}

#sidebar{
width:100%;
height:40%;
}

#map{
height:60%;
}

}

</style>
</head>

<body>

<div id="container">

<div id="sidebar">

<h3>Pali Ghat Hatchlings</h3>

<select id="idSelector">
<option value="">All Hatchlings (Latest Locations)</option>
</select>

<div id="tableContainer"></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv";

let dataset=[];
let markers=[];

const map=L.map('map',{closePopupOnClick:false}).setView([25.844,76.56],12);

L.tileLayer(
'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
{maxZoom:20}
).addTo(map);



function csvToArray(str){

const rows=str.trim().split("\n");
const headers=rows.shift().split(",");

return rows.map(r=>{
const values=r.split(",");
let obj={};

headers.forEach((h,i)=>{
obj[h.trim()]=values[i];
});

return obj;
});

}



function clearMarkers(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

}



function showLatestPoints(){

clearMarkers();

document.getElementById("tableContainer").innerHTML="";

const latest={};

dataset.forEach(row=>{

const id=row["Animal ID"];
const time=new Date(row["Timestamp"]);

if(!latest[id] || new Date(latest[id]["Timestamp"]) < time){
latest[id]=row;
}

});

Object.values(latest).forEach(p=>{

const icon=L.divIcon({
className:"",
html:`<div class="radio-id">${p["Animal ID"]}</div>`
});

const m=L.marker([
parseFloat(p["Latitude"]),
parseFloat(p["Longitude"])
],{icon}).addTo(map);

m.bindPopup(`
<b>ID ${p["Animal ID"]}</b><br>
${p["Timestamp"]}<br>
${p["Place"]}<br>
Activity: ${p["Activity"] || "-"}
`);

markers.push(m);

});

}



function computeStats(points){

let entries=points.length;

let days=[...new Set(points.map(p=>p["Timestamp"].split(" ")[0]))].length;

let dist=0;

for(let i=1;i<points.length;i++){

let lat1=parseFloat(points[i-1]["Latitude"]);
let lon1=parseFloat(points[i-1]["Longitude"]);
let lat2=parseFloat(points[i]["Latitude"]);
let lon2=parseFloat(points[i]["Longitude"]);

dist+=map.distance([lat1,lon1],[lat2,lon2]);

}

dist=(dist/1000).toFixed(2);

return {entries,days,dist};
}



function showAnimal(id){

clearMarkers();

let points=dataset
.filter(d=>d["Animal ID"]==id)
.sort((a,b)=> new Date(b["Timestamp"]) - new Date(a["Timestamp"]));

points.forEach(p=>{

const icon=L.divIcon({
className:"",
html:`<div class="radio-id">${p["Animal ID"]}</div>`
});

const m=L.marker([
parseFloat(p["Latitude"]),
parseFloat(p["Longitude"])
],{icon}).addTo(map);

m.bindPopup(`
<b>ID ${p["Animal ID"]}</b><br>
${p["Timestamp"]}<br>
${p["Place"]}<br>
Activity: ${p["Activity"] || "-"}
`);

markers.push(m);

});

let group=L.featureGroup(markers);
map.fitBounds(group.getBounds(),{padding:[40,40]});

buildTable(points);

}



function buildTable(points){

const stats=computeStats(points);

let html=`<div class="stats">
<b>Entries:</b> ${stats.entries} |
<b>Days tracked:</b> ${stats.days} |
<b>Distance:</b> ${stats.dist} km
</div>`;

html+="<table>";
html+="<tr><th>Time</th><th>Place</th><th>Activity</th><th>Signal</th></tr>";

points.forEach(p=>{

html+=`
<tr>
<td>${p["Timestamp"]}</td>
<td>${p["Place"]}</td>
<td>${p["Activity"] || "-"}</td>
<td>${p["Signal Stength"] || "-"}</td>
</tr>
`;

});

html+="</table>";

document.getElementById("tableContainer").innerHTML=html;

}



fetch(sheetURL)
.then(r=>r.text())
.then(csv=>{

dataset=csvToArray(csv);

const ids=[...new Set(dataset.map(d=>d["Animal ID"]))].sort((a,b)=>a-b);

ids.forEach(id=>{

const opt=document.createElement("option");
opt.value=id;
opt.text="ID "+id;

document.getElementById("idSelector").appendChild(opt);

});

showLatestPoints();

});



document.getElementById("idSelector")
.addEventListener("change",function(){

const id=this.value;

if(id===""){
showLatestPoints();
}else{
showAnimal(id);
}

});


</script>

</body>
</html>
