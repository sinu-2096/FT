<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pali FT Hatchlings Telemetry Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

:root{
--map-height:70vh;
--primary-bg:#f4f6f9;
--header-bg:#2c3e50;
--text-color:#333;
--border-color:#ccc;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
}

body{
background:var(--primary-bg);
color:var(--text-color);
display:flex;
flex-direction:column;
min-height:100vh;
}

header{
background:var(--header-bg);
color:white;
padding:15px 20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

header h1{
font-size:1.5rem;
}

.top-panel{
background:white;
padding:12px 20px;
border-bottom:1px solid var(--border-color);
display:flex;
align-items:center;
gap:30px;
}

.filter-group{
display:flex;
align-items:center;
gap:10px;
}

.filter-group label{
font-weight:bold;
font-size:1rem;
color:var(--header-bg);
}

.filter-group select{
padding:9px 14px;
border:1px solid var(--border-color);
border-radius:4px;
font-size:1rem;
min-width:160px;
}

.top-panel .hint-text{
font-size:0.95rem;
color:#555;
}

.map-container{
height:var(--map-height);
}

#map{
width:100%;
height:100%;
}

/* TABLE */

.table-hint{
font-size:0.85rem;
color:#777;
padding:8px 20px 0 20px;
background:white;
}

.table-container{
padding:20px;
overflow-x:auto;
background:white;
}

.telemetry-table{
width:100%;
border-collapse:collapse;
font-size:0.95rem;
}

.telemetry-table th,
.telemetry-table td{
padding:12px 15px;
text-align:left;
border-bottom:1px solid #ddd;
}

.telemetry-table th{
background-color:var(--header-bg);
color:white;
position:sticky;
top:0;
z-index:1;
font-size:0.95rem;
}

.telemetry-table tbody tr{
cursor:pointer;
transition:background-color 0.15s ease;
}

.telemetry-table tbody tr:hover{
background:#dce8f5;
}

.telemetry-table tbody tr.row-active{
background:#b8d4f0;
outline:2px solid #2980b9;
outline-offset:-2px;
}

.telemetry-table tbody tr.row-hidden{
display:none;
}

/* See More row */
.see-more-row td{
text-align:center;
padding:10px;
background:#f9f9f9;
cursor:pointer !important;
}

.see-more-row:hover td{
background:#e8f0fe !important;
}

.see-more-btn{
display:inline-block;
color:#2980b9;
font-weight:bold;
font-size:0.95rem;
border:1px solid #2980b9;
border-radius:20px;
padding:6px 20px;
transition:background 0.15s,color 0.15s;
}

.see-more-row:hover .see-more-btn{
background:#2980b9;
color:white;
}

/* MARKERS */

.animal-marker{
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
font-size:12px;
border:2px solid white;
box-shadow:0 0 5px rgba(0,0,0,0.6);
}

.marker-default{background:#007bff;}
.marker-selected{background:#dc3545;}

/* POPUP */
.custom-popup .leaflet-popup-content{
font-size:14px;
line-height:1.7;
min-width:220px;
}

.custom-popup b{color:#2c3e50;}
.popup-row{margin-bottom:5px;}

</style>
</head>

<body>

<header>
<h1>🐊 Pali FT Hatchlings Telemetry Dashboard</h1>
</header>

<div class="top-panel">
<div class="filter-group">
<label for="animalFilter">Select Animal ID</label>
<select id="animalFilter">
<option value="all">All Animals</option>
</select>
</div>
<div class="hint-text">Use dropdown to filter individual gharials and view their movement track.</div>
</div>

<div class="map-container">
<div id="map"></div>
</div>

<p class="table-hint">💡 Click any row to jump to its location on the map</p>

<div class="table-container">
<table class="telemetry-table" id="dataTable">
<thead>
<tr>
<th>Animal ID</th>
<th>Timestamp</th>
<th>Place</th>
<th>Activity</th>
<th>Signal Strength</th>
<th>Latitude</th>
<th>Longitude</th>
<th>Remarks</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>

const CSV_URL='https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv&gid=0';
const MAP_CENTER=[25.84,76.56];
const MAP_ZOOM=13;
const DEFAULT_ROWS=5;

let map;
let mapLayerGroup;
let rawData=[];
let animalsData={};
let latestRecords={};
let markerMapping={};

function init(){
  initMap();
  loadCSVData();
  document.getElementById('animalFilter')
    .addEventListener('change',e=>updateDashboard(e.target.value));
}

function initMap(){
  map=L.map('map').setView(MAP_CENTER,MAP_ZOOM);
  L.tileLayer('http://mt0.google.com/vt/lyrs=y&hl=en&x={x}&y={y}&z={z}',{
    maxZoom:20,
    attribution:'Map data © Google'
  }).addTo(map);
  mapLayerGroup=L.featureGroup().addTo(map);
}

function loadCSVData(){
  Papa.parse(CSV_URL,{
    download:true,
    header:true,
    skipEmptyLines:true,
    complete:function(results){
      rawData=results.data;
      processData();
      populateDropdown();
      updateDashboard('all');
    },
    error:function(err){
      console.error(err);
      alert("CSV loading failed");
    }
  });
}

function processData(){
  animalsData={};
  latestRecords={};
  rawData.forEach(row=>{
    const id=row['Animal ID'];
    if(!id)return;
    row.parsedDate=parseCustomDate(row['Timestamp']);
    if(!animalsData[id])animalsData[id]=[];
    animalsData[id].push(row);
  });
  for(const id in animalsData){
    animalsData[id].sort((a,b)=>b.parsedDate-a.parsedDate);
    latestRecords[id]=animalsData[id][0];
  }
}

function parseCustomDate(dateString){
  if(!dateString)return new Date(0);
  const parts=dateString.trim().split(' ');
  const dateParts=parts[0].split('-');
  const timeParts=parts[1]?parts[1].split(':'):['00','00'];
  return new Date(
    parseInt(dateParts[2]),
    parseInt(dateParts[1])-1,
    parseInt(dateParts[0]),
    parseInt(timeParts[0]),
    parseInt(timeParts[1])
  );
}

function populateDropdown(){
  const select=document.getElementById('animalFilter');
  Object.keys(animalsData).sort((a,b)=>a-b).forEach(id=>{
    const option=document.createElement('option');
    option.value=id;
    option.textContent=id;   // No brackets
    select.appendChild(option);
  });
}

function updateDashboard(selectedId){
  renderMap(selectedId);
  renderTable(selectedId);
}

function markerKey(record){
  return `${record['Animal ID']}_${record['Timestamp']}`;
}

function renderMap(selectedId){
  mapLayerGroup.clearLayers();
  markerMapping={};

  // Define the IDs you want to highlight in red
  const redIds = ['30', '33', '34', '38', '96', '64', '98'];

  if(selectedId==='all'){
    const bounds=[];
    for(const id in latestRecords){
      const record=latestRecords[id];
      const lat=parseFloat(record['Latitude']);
      const lng=parseFloat(record['Longitude']);
      if(!isNaN(lat)&&!isNaN(lng)){
        
        // Check if the current ID is in our list to determine the color
        const colorClass = redIds.includes(id.toString()) ? 'marker-selected' : 'marker-default';
        const marker=createMarker(record, colorClass);
        
        mapLayerGroup.addLayer(marker);
        markerMapping[markerKey(record)]=marker;
        bounds.push([lat,lng]);
      }
    }
    if(bounds.length>0)
      map.fitBounds(bounds,{padding:[50,50],maxZoom:MAP_ZOOM});
  } else {
    const records=animalsData[selectedId]||[];
    const latLngs=[];
    
    // Ensure the color stays consistent when filtering a specific animal
    const colorClass = redIds.includes(selectedId.toString()) ? 'marker-selected' : 'marker-default';

    for(let i=records.length-1;i>=0;i--){
      const record=records[i];
      const lat=parseFloat(record['Latitude']);
      const lng=parseFloat(record['Longitude']);
      if(!isNaN(lat)&&!isNaN(lng)){
        const marker=createMarker(record, colorClass);
        mapLayerGroup.addLayer(marker);
        markerMapping[markerKey(record)]=marker;
        latLngs.push([lat,lng]);
      }
    }
    
    // Draws the track line
    if(latLngs.length>1){
      mapLayerGroup.addLayer(L.polyline(latLngs,{
        color:'#ffc107',weight:3,opacity:0.8,dashArray:'5,10'
      }));
    }
    if(latLngs.length>0)
      map.fitBounds(latLngs,{padding:[50,50]});
  }
}

function createMarker(record,colorClass){
  const lat=parseFloat(record['Latitude']);
  const lng=parseFloat(record['Longitude']);
  const id=record['Animal ID'];

  // Read signal strength — try both possible column name variants
  const signalVal=record['Signal Strength']||record['signal strength']||record['SignalStrength']||'N/A';

  const icon=L.divIcon({
    className:`animal-marker ${colorClass}`,
    html:`<span>${id}</span>`,
    iconSize:[30,30],
    iconAnchor:[15,15],
    popupAnchor:[0,-15]
  });

  const marker=L.marker([lat,lng],{icon});

  marker.bindPopup(`
    <div class="custom-popup">
      <div class="popup-row"><b>Animal ID:</b> ${id}</div>
      <div class="popup-row"><b>Last Seen:</b> ${record['Timestamp']||'N/A'}</div>
      <div class="popup-row"><b>Location:</b><br>${record['Place']||'N/A'}</div>
      <div class="popup-row"><b>Activity:</b><br>${record['Activity']||'N/A'}</div>
      <div class="popup-row"><b>Signal Strength:</b><br>${signalVal}</div>
      <div class="popup-row"><b>Latitude:</b> ${record['Latitude']}</div>
      <div class="popup-row"><b>Longitude:</b> ${record['Longitude']}</div>
      <div class="popup-row"><b>Remarks:</b><br>${record['Remarks']||'None'}</div>
    </div>
  `);

  return marker;
}

function renderTable(selectedId){
  const tbody=document.querySelector('#dataTable tbody');
  tbody.innerHTML='';

  let tableData=[];
  if(selectedId==='all'){
    tableData=Object.values(latestRecords).sort((a,b)=>b.parsedDate-a.parsedDate);
  } else {
    tableData=animalsData[selectedId]||[];
  }

  const total=tableData.length;

  tableData.forEach((row,index)=>{
    const tr=document.createElement('tr');
    if(index>=DEFAULT_ROWS) tr.classList.add('row-hidden');

    const key=markerKey(row);
    let signalVal=row['Signal Strength']||row['signal strength']||row['SignalStrength']||'';

    tr.innerHTML=`
      <td><strong>${row['Animal ID']||''}</strong></td>
      <td>${row['Timestamp']||''}</td>
      <td>${row['Place']||''}</td>
      <td>${row['Activity']||''}</td>
      <td>${signalVal}</td>
      <td>${row['Latitude']||''}</td>
      <td>${row['Longitude']||''}</td>
      <td>${row['Remarks']||''}</td>
    `;

    tr.addEventListener('click',function(){
      document.querySelectorAll('#dataTable tbody tr').forEach(r=>r.classList.remove('row-active'));
      tr.classList.add('row-active');

      document.querySelector('.map-container').scrollIntoView({behavior:'smooth',block:'start'});

      const marker=markerMapping[key];
      if(marker){
        setTimeout(()=>{
          map.setView(marker.getLatLng(),Math.max(map.getZoom(),15),{animate:true});
          marker.openPopup();
        },500);
      }
    });

    tbody.appendChild(tr);
  });

  if(total>DEFAULT_ROWS){
    const seeMoreTr=document.createElement('tr');
    seeMoreTr.classList.add('see-more-row');
    seeMoreTr.innerHTML=`
      <td colspan="8">
        <span class="see-more-btn">See more &raquo; (${total-DEFAULT_ROWS} more entries)</span>
      </td>
    `;

    let expanded=false;
    seeMoreTr.addEventListener('click',function(){
      expanded=!expanded;
      if(expanded){
        tbody.querySelectorAll('tr.row-hidden').forEach(r=>r.classList.remove('row-hidden'));
        seeMoreTr.querySelector('.see-more-btn').innerHTML='Show less &laquo;';
      } else {
        Array.from(tbody.querySelectorAll('tr:not(.see-more-row)')).forEach((r,i)=>{
          if(i>=DEFAULT_ROWS) r.classList.add('row-hidden');
        });
        seeMoreTr.querySelector('.see-more-btn').innerHTML=`See more &raquo; (${total-DEFAULT_ROWS} more entries)`;
        tbody.closest('.table-container').scrollIntoView({behavior:'smooth',block:'start'});
      }
    });

    tbody.appendChild(seeMoreTr);
  }
}

document.addEventListener('DOMContentLoaded',init);

</script>
</body>
</html>
