<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Gharial Telemetry Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:system-ui;
}

#container{
display:flex;
height:100vh;
}

#sidebar{
width:360px;
background:white;
border-right:1px solid #ddd;
padding:20px;
display:flex;
flex-direction:column;
}

#map{
flex:1;
}

h2{
margin-top:0;
}

select{
padding:8px;
font-size:15px;
margin-bottom:15px;
}

.statbox{
display:flex;
gap:10px;
margin-bottom:15px;
}

.stat{
flex:1;
background:#f3f5f7;
padding:12px;
border-radius:8px;
text-align:center;
font-weight:600;
}

#tableContainer{
flex:1;
overflow:auto;
border-top:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
padding:6px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#fafafa;
position:sticky;
top:0;
}

.markerLabel{
background:#e53935;
color:white;
font-weight:bold;
padding:5px 8px;
border-radius:20px;
border:2px solid white;
font-size:12px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div id="container">

<div id="sidebar">

<h2>Gharial Telemetry</h2>

<label>View Animal ID:</label>

<select id="animalSelect">
<option value="">All Hatchlings</option>
</select>

<div class="statbox hidden" id="stats">

<div class="stat">
<div id="entryCount">0</div>
ENTRIES
</div>

<div class="stat">
<div id="dayCount">0</div>
DAYS
</div>

<div class="stat">
<div id="distanceCount">0</div>
KM MOVED
</div>

</div>

<div id="tableContainer" class="hidden">

<table>

<thead>
<tr>
<th>Date & Time</th>
<th>Place</th>
<th>Activity</th>
<th>Signal</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const csvURL =
"https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv";

const map = L.map("map").setView([25.86,76.56],13);

L.tileLayer(
"https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}",
{maxZoom:20}
).addTo(map);

let allData=[];
let markers=L.layerGroup().addTo(map);
let tracks=L.layerGroup().addTo(map);

function parseDate(str){

if(!str) return null;

if(str.includes("-")){

let parts=str.split(" ");
let date=parts[0].split("-");
let time=parts[1];

return new Date(`${date[2]}-${date[1]}-${date[0]} ${time}`);

}

return new Date(str);

}

function parseCSV(text){

let rows=text.trim().split("\n").slice(1);

return rows.map(r=>{

let c=r.split(",");

return{

id:c[0],
time:parseDate(c[1]),
lat:parseFloat(c[2]),
lon:parseFloat(c[3]),
place:c[4],
activity:c[5],
signal:c[6]

};

}).filter(d=>d.time && !isNaN(d.lat));

}

function markerIcon(id){

return L.divIcon({
html:`<div class="markerLabel">${id}</div>`,
iconSize:[30,30],
className:""
});

}

function loadData(){

fetch(csvURL)
.then(r=>r.text())
.then(text=>{

allData=parseCSV(text);

populateDropdown();

showLatest();

});

}

function populateDropdown(){

let ids=[...new Set(allData.map(d=>d.id))].sort((a,b)=>a-b);

let sel=document.getElementById("animalSelect");

ids.forEach(id=>{

let o=document.createElement("option");

o.value=id;
o.textContent="ID: "+id;

sel.appendChild(o);

});

}

function showLatest(){

markers.clearLayers();
tracks.clearLayers();

let latest={};

allData.forEach(d=>{

if(!latest[d.id] || latest[d.id].time < d.time){

latest[d.id]=d;

}

});

Object.values(latest).forEach(d=>{

L.marker([d.lat,d.lon],{icon:markerIcon(d.id)})
.addTo(markers)
.bindPopup(`ID: ${d.id}<br>${d.time}`);

});

}

function showAnimal(id){

markers.clearLayers();
tracks.clearLayers();

let data=allData
.filter(d=>d.id==id)
.sort((a,b)=>b.time-a.time);

let points=[];

data.forEach(d=>{

points.push([d.lat,d.lon]);

L.marker([d.lat,d.lon],{icon:markerIcon(id)})
.addTo(markers)
.bindPopup(`ID: ${id}<br>${d.time}<br>${d.place}`);

});

let poly=L.polyline(points.reverse(),{color:"cyan"}).addTo(tracks);

map.fitBounds(poly.getBounds(),{padding:[50,50]});

populateTable(data);

calculateStats(data);

}

function populateTable(data){

let body=document.getElementById("tableBody");

body.innerHTML="";

data.forEach(d=>{

let row=document.createElement("tr");

row.innerHTML=`
<td>${d.time.toLocaleString()}</td>
<td>${d.place}</td>
<td>${d.activity}</td>
<td>${d.signal}</td>
`;

body.appendChild(row);

});

document.getElementById("tableContainer").classList.remove("hidden");

}

function calculateStats(data){

let entries=data.length;

let days=new Set(data.map(d=>d.time.toDateString())).size;

let dist=0;

for(let i=1;i<data.length;i++){

let p1=L.latLng(data[i-1].lat,data[i-1].lon);
let p2=L.latLng(data[i].lat,data[i].lon);

dist+=p1.distanceTo(p2);

}

dist=(dist/1000).toFixed(2);

document.getElementById("entryCount").textContent=entries;
document.getElementById("dayCount").textContent=days;
document.getElementById("distanceCount").textContent=dist;

document.getElementById("stats").classList.remove("hidden");

}

document.getElementById("animalSelect")
.addEventListener("change",e=>{

let id=e.target.value;

if(!id){

document.getElementById("stats").classList.add("hidden");
document.getElementById("tableContainer").classList.add("hidden");

showLatest();

}else{

showAnimal(id);

}

});

loadData();

</script>

</body>
</html>
