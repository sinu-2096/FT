<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Chambal Gharial Hatchling Telemetry Dashboard</title>

<!-- =========================
     LEAFLET + PAPAPARSE CDN
========================= -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

/* =========================
   PAGE LAYOUT
========================= */

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f8;
}

#topContainer{
    display:flex;
    width:100%;
    height:70vh;
}

/* =========================
   SIDEBAR
========================= */

#sidebar{
    width:300px;
    background:white;
    border-right:1px solid #ddd;
    padding:20px;
    box-sizing:border-box;
}

#sidebar h2{
    margin-top:0;
}

select{
    width:100%;
    padding:8px;
    font-size:14px;
}

/* =========================
   MAP
========================= */

#map{
    flex:1;
}

/* =========================
   TABLE
========================= */

#tableContainer{
    width:100%;
    padding:15px;
    box-sizing:border-box;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#2f3640;
    color:white;
    padding:8px;
    text-align:left;
}

td{
    padding:6px;
    border-bottom:1px solid #ddd;
}

tr:hover{
    background:#f2f2f2;
}

/* =========================
   CUSTOM MARKERS
========================= */

.marker-blue{
    background:#1976d2;
    color:white;
    width:28px;
    height:28px;
    border-radius:50%;
    text-align:center;
    line-height:28px;
    font-weight:bold;
    border:2px solid white;
}

.marker-red{
    background:#e53935;
    color:white;
    width:26px;
    height:26px;
    border-radius:50%;
    text-align:center;
    line-height:26px;
    font-weight:bold;
    border:2px solid white;
}

</style>
</head>

<body>

<!-- =========================
     HTML LAYOUT
========================= -->

<div id="topContainer">

    <!-- SIDEBAR -->
    <div id="sidebar">

        <h2>Telemetry Filter</h2>

        <label>Select Animal ID</label>

        <select id="animalSelect">
            <option value="all">All Animals</option>
        </select>

        <p style="font-size:12px;color:#666;margin-top:15px">
        Default view shows latest location of each hatchling.
        </p>

    </div>

    <!-- MAP -->
    <div id="map"></div>

</div>

<!-- TABLE -->
<div id="tableContainer">
<table id="dataTable">

<thead>
<tr>
<th>Animal ID</th>
<th>Timestamp</th>
<th>Place</th>
<th>Activity</th>
<th>Signal</th>
<th>Latitude</th>
<th>Longitude</th>
<th>Remarks</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>


<script>

/* =========================================================
   CONFIG
========================================================= */

const CSV_URL = "https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv&gid=0";

/* =========================================================
   GLOBAL VARIABLES
========================================================= */

let map;
let markersLayer = L.layerGroup();
let trackLayer = L.layerGroup();

let allData = [];
let groupedData = {};

/* =========================================================
   LEAFLET MAP INITIALIZATION
========================================================= */

function initMap(){

map = L.map('map').setView([25.84,76.56],13);

/* Google Hybrid Satellite */

L.tileLayer(
'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
{
maxZoom:20,
attribution:'Google Hybrid'
}).addTo(map);

markersLayer.addTo(map);
trackLayer.addTo(map);

}

/* =========================================================
   LOAD GOOGLE SHEET CSV
========================================================= */

function loadCSV(){

Papa.parse(CSV_URL,{

download:true,
header:true,
skipEmptyLines:true,

complete:function(results){

processData(results.data);

}

});

}

/* =========================================================
   PROCESS DATA
========================================================= */

function processData(rows){

rows.forEach(r=>{

/* Convert timestamp */

r.dateObj = parseDate(r.Timestamp);

/* Ensure numeric */

r.Latitude = parseFloat(r.Latitude);
r.Longitude = parseFloat(r.Longitude);

/* Group by animal */

if(!groupedData[r["Animal ID"]]){
groupedData[r["Animal ID"]] = [];
}

groupedData[r["Animal ID"]].push(r);

allData.push(r);

});

/* Sort each animal */

for(let id in groupedData){

groupedData[id].sort((a,b)=>a.dateObj - b.dateObj);

}

/* Populate dropdown */

populateDropdown();

/* Render default */

renderLatestMarkers();
renderTableLatest();

}

/* =========================================================
   DATE PARSER
   DD-MM-YYYY HH:MM
========================================================= */

function parseDate(str){

let parts = str.split(" ");

let d = parts[0].split("-");
let t = parts[1].split(":");

return new Date(d[2],d[1]-1,d[0],t[0],t[1]);

}

/* =========================================================
   DROPDOWN
========================================================= */

function populateDropdown(){

let select = document.getElementById("animalSelect");

Object.keys(groupedData).sort().forEach(id=>{

let opt = document.createElement("option");
opt.value = id;
opt.textContent = id;
select.appendChild(opt);

});

}

/* =========================================================
   CREATE MARKER ICON
========================================================= */

function createIcon(id,color){

let className = color === "red" ? "marker-red":"marker-blue";

return L.divIcon({

className:"",
html:`<div class="${className}">${id}</div>`,
iconSize:[28,28],
iconAnchor:[14,14]

});

}

/* =========================================================
   MARKER POPUP
========================================================= */

function buildPopup(d){

return `
<b>Animal ID:</b> ${d["Animal ID"]}<br><br>

<b>Last Seen:</b> ${d.Timestamp}<br><br>

<b>Location:</b><br>
${d.Place}<br><br>

<b>Activity:</b><br>
${d.Activity || "-"}<br><br>

<b>Signal Strength:</b><br>
${d["Signal Strength"] || "-"}<br><br>

<b>Latitude:</b> ${d.Latitude}<br>
<b>Longitude:</b> ${d.Longitude}<br><br>

<b>Remarks:</b><br>
${d.Remarks || "-"}

`;

}

/* =========================================================
   DEFAULT VIEW
   LATEST MARKERS
========================================================= */

function renderLatestMarkers(){

markersLayer.clearLayers();
trackLayer.clearLayers();

let bounds=[];

for(let id in groupedData){

let records = groupedData[id];

let latest = records[records.length-1];

let marker = L.marker(

[latest.Latitude,latest.Longitude],
{icon:createIcon(id,"blue")}

).bindPopup(buildPopup(latest));

markersLayer.addLayer(marker);

bounds.push([latest.Latitude,latest.Longitude]);

}

if(bounds.length){
map.fitBounds(bounds,{padding:[50,50]});
}

}

/* =========================================================
   INDIVIDUAL ANIMAL TRACK
========================================================= */

function renderAnimalTrack(id){

markersLayer.clearLayers();
trackLayer.clearLayers();

let records = groupedData[id];

let latlngs=[];

records.forEach(r=>{

let marker = L.marker(
[r.Latitude,r.Longitude],
{icon:createIcon(id,"red")}
).bindPopup(buildPopup(r));

markersLayer.addLayer(marker);

latlngs.push([r.Latitude,r.Longitude]);

});

/* polyline */

let line = L.polyline(latlngs,{
color:"red",
weight:3
});

trackLayer.addLayer(line);

map.fitBounds(line.getBounds(),{padding:[50,50]});

}

/* =========================================================
   TABLE RENDERING
========================================================= */

function renderTableLatest(){

let tbody = document.querySelector("#dataTable tbody");
tbody.innerHTML="";

for(let id in groupedData){

let latest = groupedData[id][groupedData[id].length-1];

addRow(tbody,latest);

}

}

function renderTableAnimal(id){

let tbody = document.querySelector("#dataTable tbody");
tbody.innerHTML="";

let records = [...groupedData[id]].reverse();

records.forEach(r=>addRow(tbody,r));

}

function addRow(tbody,r){

let tr = document.createElement("tr");

tr.innerHTML=`
<td>${r["Animal ID"]}</td>
<td>${r.Timestamp}</td>
<td>${r.Place}</td>
<td>${r.Activity||"-"}</td>
<td>${r["Signal Strength"]||"-"}</td>
<td>${r.Latitude}</td>
<td>${r.Longitude}</td>
<td>${r.Remarks||"-"}</td>
`;

tbody.appendChild(tr);

}

/* =========================================================
   FILTER LOGIC
========================================================= */

document.getElementById("animalSelect").addEventListener("change",function(){

let val = this.value;

if(val==="all"){

renderLatestMarkers();
renderTableLatest();

}else{

renderAnimalTrack(val);
renderTableAnimal(val);

}

});

/* =========================================================
   INITIALIZE APP
========================================================= */

initMap();
loadCSV();

</script>

</body>
</html>
