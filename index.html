<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pali Ghat Hatchlings</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
}

#container{
display:flex;
height:100vh;
}

#sidebar{
width:360px;
background:#f7f7f7;
padding:12px;
overflow:auto;
border-right:1px solid #ddd;
}

#map{
flex:1;
}

h3{
margin-top:0;
}

select{
width:100%;
padding:8px;
margin-bottom:10px;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th{
background:#e9e9e9;
padding:6px;
text-align:left;
border-bottom:1px solid #ccc;
}

td{
padding:6px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f0f0f0;
}

.time{
font-weight:bold;
}

.place{
color:#555;
}

.activity{
font-style:italic;
}

.signal{
color:#006600;
font-weight:bold;
}

@media(max-width:768px){

#container{
flex-direction:column;
}

#sidebar{
width:100%;
height:45%;
}

#map{
height:55%;
}

}

</style>
</head>

<body>

<div id="container">

<div id="sidebar">

<h3>Pali Ghat Hatchlings</h3>

<select id="idSelector">
<option value="">All Hatchlings (Latest Locations)</option>
</select>

<div id="tableContainer"></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/10maxgDHDOISlVaN3kuc0_BjxOwPVysci5AiFL-WAxoQ/export?format=csv";

let dataset=[];
let markers=[];

const map=L.map('map',{closePopupOnClick:false}).setView([25.844,76.56],12);

L.tileLayer(
'https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',
{maxZoom:20}
).addTo(map);



function csvToArray(str){

const rows=str.trim().split("\n");
const headers=rows.shift().split(",");

return rows.map(r=>{
const values=r.split(",");
let obj={};

headers.forEach((h,i)=>{
obj[h.trim()]=values[i];
});

return obj;
});

}



function clearMarkers(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

}



function showLatestPoints(){

clearMarkers();

const latest={};

dataset.forEach(row=>{

const id=row["Animal ID"];
const time=new Date(row["Timestamp"]);

if(!latest[id] || new Date(latest[id]["Timestamp"]) < time){
latest[id]=row;
}

});

Object.values(latest).forEach(p=>{

const m=L.marker([
parseFloat(p["Latitude"]),
parseFloat(p["Longitude"])
]).addTo(map);

m.bindPopup(`
<b>ID ${p["Animal ID"]}</b><br>
${p["Timestamp"]}<br>
${p["Place"]}<br>
Activity: ${p["Activity"] || "-"}
`);

markers.push(m);

});

}



function showAnimal(id){

clearMarkers();

let points=dataset
.filter(d=>d["Animal ID"]==id)
.sort((a,b)=> new Date(b["Timestamp"]) - new Date(a["Timestamp"]));

points.forEach(p=>{

const m=L.marker([
parseFloat(p["Latitude"]),
parseFloat(p["Longitude"])
]).addTo(map);

m.bindPopup(`
<b>ID ${p["Animal ID"]}</b><br>
${p["Timestamp"]}<br>
${p["Place"]}<br>
Activity: ${p["Activity"] || "-"}
`);

markers.push(m);

});

buildTable(points);

}



function buildTable(points){

let html="<table>";
html+="<tr><th>Time</th><th>Place</th><th>Activity</th><th>Signal</th></tr>";

points.forEach(p=>{

html+=`
<tr>
<td class="time">${p["Timestamp"]}</td>
<td class="place">${p["Place"]}</td>
<td class="activity">${p["Activity"] || "-"}</td>
<td class="signal">${p["Signal Stength"] || "-"}</td>
</tr>
`;

});

html+="</table>";

document.getElementById("tableContainer").innerHTML=html;

}



fetch(sheetURL)
.then(r=>r.text())
.then(csv=>{

dataset=csvToArray(csv);

const ids=[...new Set(dataset.map(d=>d["Animal ID"]))].sort((a,b)=>a-b);

ids.forEach(id=>{

const opt=document.createElement("option");
opt.value=id;
opt.text="ID "+id;

document.getElementById("idSelector").appendChild(opt);

});

showLatestPoints();

});



document.getElementById("idSelector")
.addEventListener("change",function(){

const id=this.value;

document.getElementById("tableContainer").innerHTML="";

if(id===""){
showLatestPoints();
}else{
showAnimal(id);
}

});


</script>

</body>
</html>
